name: Frontend E2E

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: frontend-e2e
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright against VPS test env
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      SSH_OPTS: -o ServerAliveInterval=30 -o ServerAliveCountMax=12 -o TCPKeepAlive=yes -o ConnectTimeout=30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_TEST_SSH_KEY }}

      - name: Trust VPS host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.VPS_TEST_PORT }}" -H "${{ secrets.VPS_TEST_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare remote directories
        run: |
          ssh $SSH_OPTS -p "${{ secrets.VPS_TEST_PORT }}" "${{ secrets.VPS_TEST_USER }}@${{ secrets.VPS_TEST_HOST }}" \
            "mkdir -p '/opt/app/frontend-test/releases/${{ github.sha }}' '/opt/app/frontend-test/shared'"

      - name: Upload release archive
        run: |
          tar -czf "$RUNNER_TEMP/frontend-test-release.tgz" \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=.env \
            --exclude=.next \
            --exclude=.github \
            --exclude=coverage \
            --exclude=.vercel \
            --exclude=out \
            .

          scp $SSH_OPTS -P "${{ secrets.VPS_TEST_PORT }}" "$RUNNER_TEMP/frontend-test-release.tgz" \
            "${{ secrets.VPS_TEST_USER }}@${{ secrets.VPS_TEST_HOST }}:/opt/app/frontend-test/releases/${{ github.sha }}.tgz"

      - name: Extract and deploy
        run: |
          ssh $SSH_OPTS -p "${{ secrets.VPS_TEST_PORT }}" "${{ secrets.VPS_TEST_USER }}@${{ secrets.VPS_TEST_HOST }}" \
            "set -e; RELEASE_DIR='/opt/app/frontend-test/releases/${{ github.sha }}'; ARCHIVE='/opt/app/frontend-test/releases/${{ github.sha }}.tgz'; tar -xzf \"\$ARCHIVE\" -C \"\$RELEASE_DIR\"; rm -f \"\$ARCHIVE\"; cd \"\$RELEASE_DIR\"; sh deploy/test/deploy.sh"

      - name: Open tunnel
        run: |
          ssh -fN $SSH_OPTS -p "${{ secrets.VPS_TEST_PORT }}" -L 9100:127.0.0.1:9100 "${{ secrets.VPS_TEST_USER }}@${{ secrets.VPS_TEST_HOST }}"

      - name: Open backend tunnel
        run: |
          ssh -fN $SSH_OPTS -p "${{ secrets.VPS_TEST_PORT }}" -L 9101:127.0.0.1:9101 "${{ secrets.VPS_TEST_USER }}@${{ secrets.VPS_TEST_HOST }}"

      - name: Run Playwright
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:9100
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: pnpm test:e2e

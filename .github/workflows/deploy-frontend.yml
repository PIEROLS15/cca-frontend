name: Frontend Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: frontend-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build release and deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package release
        run: |
          tar -czf "$RUNNER_TEMP/frontend-release.tgz" \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=.env \
            --exclude=.next \
            --exclude=.github \
            --exclude=coverage \
            --exclude=.vercel \
            --exclude=out \
            .

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust VPS host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare remote directories
        run: |
          ssh -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p '${{ secrets.VPS_FRONTEND_DIR }}/releases/${{ github.sha }}' '${{ secrets.VPS_FRONTEND_DIR }}/shared'"

      - name: Upload release archive
        run: |
          scp -P "${{ secrets.VPS_PORT }}" "$RUNNER_TEMP/frontend-release.tgz" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_FRONTEND_DIR }}/releases/${{ github.sha }}.tgz"

      - name: Extract and deploy
        run: |
          ssh -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "set -e; RELEASE_DIR='${{ secrets.VPS_FRONTEND_DIR }}/releases/${{ github.sha }}'; ARCHIVE='${{ secrets.VPS_FRONTEND_DIR }}/releases/${{ github.sha }}.tgz'; tar -xzf \"\$ARCHIVE\" -C \"\$RELEASE_DIR\"; rm -f \"\$ARCHIVE\"; cd \"\$RELEASE_DIR\"; sh deploy/frontend/deploy.sh"
